<ion-header>
  <ion-toolbar>
    <ion-title>{{ 'login.title' | transloco }}</ion-title>
    <ion-buttons slot="end">
      <app-language-toggle />
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">
  <form id="login-form" class="login-form" [formRoot]="loginForm">
    <section class="login-fields">
      <ion-input
        type="tel"
        inputmode="tel"
        [label]="'login.phone' | transloco"
        labelPlacement="stacked"
        fill="outline"
        [formField]="loginForm.phone"
        [placeholder]="'login.phone' | transloco"
      />
      <ion-input
        type="password"
        [label]="'login.password' | transloco"
        labelPlacement="stacked"
        fill="outline"
        [formField]="loginForm.password"
        [placeholder]="'login.password' | transloco"
      >
        <ion-input-password-toggle slot="end" />
      </ion-input>
    </section>
  </form>
</ion-content>

<ion-footer class="login-footer">
  <ion-toolbar>
    <ion-button
      class="login-submit"
      expand="block"
      size="large"
      shape="round"
      type="submit"
      form="login-form"
    >
      {{ 'login.submit' | transloco }}
    </ion-button>
  </ion-toolbar>
</ion-footer>
